name: Сборка APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Установка инструментов
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev build-essential apk-utils libffi-dev platform-tools openjdk-17-jdk unzip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install buildozer cython virtualenv
      - name: Сборка через Buildozer
        run: |
          buildozer init
          sed -i 's/requirements = .*/requirements = python3,pygame/g' buildozer.spec
          yes | buildozer -v android debug
      - name: Сохранение APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberJumper-APK
          path: bin/*.apk
